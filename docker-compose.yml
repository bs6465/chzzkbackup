services:
  chzzkbackup:
    image: chzzkbackup:0.2.0
    build:
      context: .
    container_name: chzzkbackup
    user: "1000:1000"
    restart: unless-stopped
    environment:
      TZ: Asia/Seoul
      APP_DATA_DIR: /app/data
      TEMP_DIR: /app/temp
      FINAL_ROOT: /data/chzzk_backup
      POLL_INTERVAL_SECONDS: "10"
      DISK_WARN_BYTES: "107374182400"
      LOG_RETENTION_MAX_ROWS: "1000"
    ports:
      - "0.0.0.0:8733:8733"
    volumes:
      - ./data:/app/data
      - ./temp:/app/temp
      - /home/bsubt/passport/chzzk_backup:/data/chzzk_backup
